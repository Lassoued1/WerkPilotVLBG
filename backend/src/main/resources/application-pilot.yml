logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS,UTC}","level":"%level","service":"${spring.application.name:-werkpilot-backend}","traceId":"%X{traceId:-}","userId":"%X{userId:-}","logger":"%logger{36}","message":"%msg"}%n'

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

werkpilot:
  identity:
    demo-admin:
      enabled: false
