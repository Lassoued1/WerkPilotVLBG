databaseChangeLog:
  - changeSet:
      id: 0004-01-password-reset-tokens
      author: codex
      comment: Store hashed one-time password reset tokens for WP-S1-03.
      changes:
        - createTable:
            tableName: password_reset_token
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_password_reset_token_user
                    references: app_user(id)
                    deleteCascade: true
              - column:
                  name: token_hash
                  type: varchar(64)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_password_reset_token_hash
              - column:
                  name: requested_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: consumed_at
                  type: timestamptz
        - createIndex:
            tableName: password_reset_token
            indexName: ix_password_reset_token_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: password_reset_token
            indexName: ix_password_reset_token_expires_at
            columns:
              - column:
                  name: expires_at
      rollback:
        - dropTable:
            tableName: password_reset_token
