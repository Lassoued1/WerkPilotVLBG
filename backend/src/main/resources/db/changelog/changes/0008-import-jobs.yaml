databaseChangeLog:
  - changeSet:
      id: 0008-01-import-job-lifecycle
      author: codex
      comment: Add import job and bounded import error persistence for WP-S2-01.
      changes:
        - createTable:
            tableName: import_job
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: import_type
                  type: varchar(40)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(24)
                  constraints:
                    nullable: false
              - column:
                  name: original_filename
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: safe_filename
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: file_hash_sha256
                  type: char(64)
                  constraints:
                    nullable: false
              - column:
                  name: file_size_bytes
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: total_rows
                  type: integer
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: valid_rows
                  type: integer
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: error_count
                  type: integer
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: error_overflow
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: corrects_import_job_id
                  type: uuid
              - column:
                  name: created_by_user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: completed_at
                  type: timestamptz
              - column:
                  name: failure_reason
                  type: varchar(500)
        - addForeignKeyConstraint:
            baseTableName: import_job
            baseColumnNames: corrects_import_job_id
            referencedTableName: import_job
            referencedColumnNames: id
            constraintName: fk_import_job_corrects
        - addForeignKeyConstraint:
            baseTableName: import_job
            baseColumnNames: created_by_user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_import_job_created_by
        - addUniqueConstraint:
            tableName: import_job
            columnNames: import_type, file_hash_sha256
            constraintName: uq_import_job_type_hash
        - createIndex:
            tableName: import_job
            indexName: ix_import_job_created_at
            columns:
              - column:
                  name: created_at
        - createIndex:
            tableName: import_job
            indexName: ix_import_job_status
            columns:
              - column:
                  name: status
        - createTable:
            tableName: import_job_error
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: import_job_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: row_number
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: column_name
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: rejected_value
                  type: varchar(500)
              - column:
                  name: message
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: import_job_error
            baseColumnNames: import_job_id
            referencedTableName: import_job
            referencedColumnNames: id
            constraintName: fk_import_job_error_job
            onDelete: CASCADE
        - createIndex:
            tableName: import_job_error
            indexName: ix_import_job_error_job_row
            columns:
              - column:
                  name: import_job_id
              - column:
                  name: row_number
      rollback:
        - dropTable:
            tableName: import_job_error
        - dropTable:
            tableName: import_job
