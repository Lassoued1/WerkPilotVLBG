databaseChangeLog:
  - changeSet:
      id: 0009-01-production-records
      author: codex
      comment: Create production records for WP-S2-03 CSV imports.
      changes:
        - createTable:
            tableName: production_record
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_production_record
                    nullable: false
              - column:
                  name: import_job_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: period_start
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: period_end
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: factory_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: line_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: machine_id
                  type: uuid
              - column:
                  name: product_id
                  type: uuid
              - column:
                  name: shift_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: units_produced
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: batch_code
                  type: varchar(80)
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: production_record
            baseColumnNames: import_job_id
            constraintName: fk_production_record_import_job
            referencedTableName: import_job
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: production_record
            baseColumnNames: factory_id
            constraintName: fk_production_record_factory
            referencedTableName: factory
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: production_record
            baseColumnNames: line_id
            constraintName: fk_production_record_line
            referencedTableName: production_line
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: production_record
            baseColumnNames: machine_id
            constraintName: fk_production_record_machine
            referencedTableName: machine
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: production_record
            baseColumnNames: product_id
            constraintName: fk_production_record_product
            referencedTableName: product
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: production_record
            baseColumnNames: shift_id
            constraintName: fk_production_record_shift
            referencedTableName: shift
            referencedColumnNames: id
        - sql:
            sql: alter table production_record add constraint ck_production_record_period_order check (period_end > period_start)
        - sql:
            sql: alter table production_record add constraint ck_production_record_units_non_negative check (units_produced >= 0)
        - createIndex:
            tableName: production_record
            indexName: ix_production_record_import_job_id
            columns:
              - column:
                  name: import_job_id
        - createIndex:
            tableName: production_record
            indexName: ix_production_record_period
            columns:
              - column:
                  name: period_start
              - column:
                  name: period_end