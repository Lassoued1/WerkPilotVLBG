databaseChangeLog:
  - changeSet:
      id: 0007-01-audit-query-support
      author: codex
      comment: Add audit query support fields and indexes for WP-S1-06.
      changes:
        - addColumn:
            tableName: audit_event
            columns:
              - column:
                  name: trace_id
                  type: varchar(80)
        - createIndex:
            tableName: audit_event
            indexName: ix_audit_event_occurred_at
            columns:
              - column:
                  name: occurred_at
        - createIndex:
            tableName: audit_event
            indexName: ix_audit_event_actor_user_id
            columns:
              - column:
                  name: actor_user_id
      rollback:
        - dropIndex:
            tableName: audit_event
            indexName: ix_audit_event_actor_user_id
        - dropIndex:
            tableName: audit_event
            indexName: ix_audit_event_occurred_at
        - dropColumn:
            tableName: audit_event
            columnName: trace_id
