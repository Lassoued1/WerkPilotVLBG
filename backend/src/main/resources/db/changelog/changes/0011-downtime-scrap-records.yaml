databaseChangeLog:
  - changeSet:
      id: 0011-01-downtime-and-scrap-records
      author: codex
      comment: Create downtime and scrap records for WP-S2-05 CSV imports.
      changes:
        - createTable:
            tableName: downtime_record
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_downtime_record
                    nullable: false
              - column:
                  name: import_job_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: period_start
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: period_end
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: machine_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: shift_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: downtime_min
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: reason_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: comment
                  type: varchar(500)
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: downtime_record
            baseColumnNames: import_job_id
            constraintName: fk_downtime_record_import_job
            referencedTableName: import_job
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: downtime_record
            baseColumnNames: machine_id
            constraintName: fk_downtime_record_machine
            referencedTableName: machine
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: downtime_record
            baseColumnNames: shift_id
            constraintName: fk_downtime_record_shift
            referencedTableName: shift
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: downtime_record
            baseColumnNames: reason_id
            constraintName: fk_downtime_record_reason
            referencedTableName: downtime_reason
            referencedColumnNames: id
        - sql:
            sql: alter table downtime_record add constraint ck_downtime_record_period_order check (period_end > period_start)
        - sql:
            sql: alter table downtime_record add constraint ck_downtime_record_minutes_non_negative check (downtime_min >= 0)
        - createIndex:
            tableName: downtime_record
            indexName: ix_downtime_record_import_job_id
            columns:
              - column:
                  name: import_job_id
        - createTable:
            tableName: scrap_record
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_scrap_record
                    nullable: false
              - column:
                  name: import_job_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: period_start
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: period_end
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: machine_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: shift_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: scrap_count
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: scrap_category_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: scrap_record
            baseColumnNames: import_job_id
            constraintName: fk_scrap_record_import_job
            referencedTableName: import_job
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: scrap_record
            baseColumnNames: machine_id
            constraintName: fk_scrap_record_machine
            referencedTableName: machine
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: scrap_record
            baseColumnNames: product_id
            constraintName: fk_scrap_record_product
            referencedTableName: product
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: scrap_record
            baseColumnNames: shift_id
            constraintName: fk_scrap_record_shift
            referencedTableName: shift
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: scrap_record
            baseColumnNames: scrap_category_id
            constraintName: fk_scrap_record_category
            referencedTableName: scrap_category
            referencedColumnNames: id
        - sql:
            sql: alter table scrap_record add constraint ck_scrap_record_period_order check (period_end > period_start)
        - sql:
            sql: alter table scrap_record add constraint ck_scrap_record_count_non_negative check (scrap_count >= 0)
        - createIndex:
            tableName: scrap_record
            indexName: ix_scrap_record_import_job_id
            columns:
              - column:
                  name: import_job_id
