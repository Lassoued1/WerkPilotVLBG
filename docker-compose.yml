name: werkpilot-vlbg

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${WERKPILOT_POSTGRES_DB:-werkpilot}
      POSTGRES_USER: ${WERKPILOT_POSTGRES_USER:-werkpilot}
      POSTGRES_PASSWORD: ${WERKPILOT_POSTGRES_PASSWORD:-werkpilot}
    ports:
      - "${WERKPILOT_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      WERKPILOT_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${WERKPILOT_POSTGRES_DB:-werkpilot}
      WERKPILOT_DATASOURCE_USERNAME: ${WERKPILOT_POSTGRES_USER:-werkpilot}
      WERKPILOT_DATASOURCE_PASSWORD: ${WERKPILOT_POSTGRES_PASSWORD:-werkpilot}
      WERKPILOT_REPORT_FILES_DIR: /var/lib/werkpilot/report-files
      WERKPILOT_SMTP_HOST: ${WERKPILOT_SMTP_HOST:-mailpit}
      WERKPILOT_SMTP_PORT: ${WERKPILOT_SMTP_PORT:-1025}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8081}
    ports:
      - "${WERKPILOT_BACKEND_PORT:-8080}:8080"
    volumes:
      - report-files:/var/lib/werkpilot/report-files
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 45s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "${WERKPILOT_FRONTEND_PORT:-8081}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  mailpit:
    image: axllent/mailpit:v1.27
    profiles:
      - local
      - test
    ports:
      - "${WERKPILOT_MAILPIT_SMTP_PORT:-1025}:1025"
      - "${WERKPILOT_MAILPIT_WEB_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8025/livez"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  report-files:

